# ================================================
# Alembic Configuration — LawSaaS
# ================================================

[alembic]
# مسار مجلد migrations
script_location = alembic

# نمط تسمية ملفات الـ migration
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# رابط قاعدة البيانات — يُقرأ من متغيرات البيئة في env.py
# sqlalchemy.url = sqlite:///./law_firm.db

# تنسيق التاريخ في أسماء الملفات
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
